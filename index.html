<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Café Name</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Bebas+Neue&family=Bitcount+Prop+Double+Ink:wght@100..900&family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=UnifrakturMaguntia&display=swap"
      rel="stylesheet"
    />
    <style>
      /* GENERAL */
      body {
        margin: 0;
        font-family: "Roboto", sans-serif;
        background: #fafafa;
        color: #333;
      }

      /* HERO */
      .hero {
        position: relative;
        width: 100%;
        max-height: 70vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        background-image: url(images/cafe1_waifu2x_3840x2160_png.png);
        width: 100%;
        height: 60vh;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .hero h1 {
        position: absolute;
        font-size: 48px;
        color: #fff;
        background: rgba(0, 0, 0, 0.5);
        padding: 15px 30px;
        border-radius: 10px;
      }

      /* MENU */
      .menu {
        max-width: 900px;
        margin: 40px auto;
        padding: 0 20px;
      }

      .menu h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #111;
      }

      .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }

      .card {
        background: #fff;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        text-align: center;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
      }

      .card span {
        display: block;
        margin: 10px 0;
        font-size: 18px;
      }
      .card img {
        width: 100%;
        height: autob
        object-fit: cover;
        border-radius: 5px;
        transition: 0.5s;
      }
      .card img:hover {
        transform: scale(1.05);
      }

      .price {
        font-weight: 700;
        color: #111;
        font-size: 20px;
      }

      /* BUTTONS */
      .buttons {
        text-align: center;
        margin: 30px;
      }

      .buttons a {
        display: inline-block;
        margin: 10px;
        padding: 12px 25px;
        background: #111;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        transition: 0.3s;
      }

      .buttons a:hover {
        background: #444;
      }

      /* FOOTER */
      footer {
        text-align: center;
        padding: 20px;
        font-size: 14px;
        color: #555;
        background: #f0f0f0;
        margin-top: 40px;
        border-top: 1px solid #ddd;
      }

      .hero-text {
        display: none;
      }

      @media (max-width: 500px) {
        .hero h1 {
          font-size: 36px;
          padding: 10px 20px;
        }
        .card {
          padding: 15px;
        }
        .hero {
          background-image: url(images/mobile-hero.jpg);
          width: 100%;
          height: 40vh;
          background-size: cover;
          background-position: center;
          background-repeat: no-repeat;
        }
        .hero::before {
          content: "";
          inset: 0;
          position: absolute;
          background: rgba(0, 0, 0, 0.3);
        }
      }
    </style>
  </head>
  <body>
    <!-- HERO SECTION -->
    <div class="hero"></div>

    <!-- MENU -->
    <div class="menu">
      <h2>Our Menu</h2>
      <div class="menu-grid">
        <div class="card">
          <img src="images/dum.jpg" alt="espresso" />
          <span>Dumplings</span>
          <span class="price">₹100</span>
        </div>
        <div class="card">
          <span>Cappuccino</span>
          <span class="price">₹120</span>
        </div>
        <div class="card">
          <span>Sandwich</span>
          <span class="price">₹150</span>
        </div>
        <div class="card">
          <span>Pastry</span>
          <span class="price">₹80</span>
        </div>
      </div>
    </div>

    <!-- BUTTONS -->
    <div class="buttons">
      <a href="https://www.instagram.com/the._.farraway/">Instagram</a>
      <a href="#">Location</a>
    </div>

    <!-- FOOTER -->
    <footer>&copy; 2026 The Farraway. All rights reserved.</footer>
  </body>
</html>
